<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Biblioteca - Usuários</title>

    <!-- Google Fonts -->
    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tabelas.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/usuarios.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-book"></i>
            Biblioteca
        </div>

        <nav>

            <a href="index.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="livros.html">
                <i class="fa-solid fa-book-open"></i>
                Livros
            </a>

            <a href="usuarios.html" class="active">
                <i class="fa-solid fa-users"></i>
                Usuários
            </a>

            <a href="emprestimos.html">
                <i class="fa-solid fa-right-left"></i>
                Empréstimos
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOPO -->
        <div class="topbar">

            <div>
                <h1>Usuários</h1>

                <p class="subtitle">
                    Gerencie os usuários cadastrados na biblioteca
                </p>
            </div>

            <button class="btn" id="btn-novo-usuario">
                <i class="fa-solid fa-plus"></i>
                Novo Usuário
            </button>

        </div>

        <!-- CARDS -->
        <section class="usuarios-cards">

            <div class="usuario-card">

                <div class="card-icon blue">
                    <i class="fa-solid fa-users"></i>
                </div>

                <div>
                    <h2 id="total-usuarios">0</h2>
                    <p>Total de usuários</p>
                </div>

            </div>

            <div class="usuario-card">

                <div class="card-icon green">
                    <i class="fa-solid fa-user-check"></i>
                </div>

                <div>
                    <h2 id="usuarios-ativos">0</h2>
                    <p>Usuários ativos</p>
                </div>

            </div>

            <div class="usuario-card">

                <div class="card-icon red">
                    <i class="fa-solid fa-user-xmark"></i>
                </div>

                <div>
                    <h2 id="usuarios-inativos">0</h2>
                    <p>Usuários inativos</p>
                </div>

            </div>

        </section>

        <!-- TABELA -->
        <section class="table-container">

            <div class="table-header">

                <h2>Lista de Usuários</h2>

                <div class="table-actions">

                    <div class="search-box">

                        <input
                            type="text"
                            id="buscar-usuario"
                            placeholder="Buscar usuário..."
                        >

                    </div>

                    <select id="filtro-status" class="filter-select">

                        <option value="">
                            Todos
                        </option>

                        <option value="ativo">
                            Ativos
                        </option>

                        <option value="inativo">
                            Inativos
                        </option>

                    </select>

                </div>

            </div>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Matrícula</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="tabela-usuarios">

                </tbody>

            </table>

        </section>

    </main>

    <!-- MODAL -->
    <div class="modal" id="modal-usuario">

        <div class="modal-content">

            <div class="modal-header">

                <h2>
                    Cadastrar Usuário
                </h2>

                <button class="btn-close" id="btn-fechar-modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>

            </div>

            <form id="form-usuario">

                <input type="hidden" id="usuario-id">

                <div class="form-row">

                    <div class="form-group">

                        <label>Nome completo</label>

                        <input
                            type="text"
                            id="nome"
                            placeholder="Ex: João Silva"
                        >

                    </div>

                    <div class="form-group">

                        <label>E-mail</label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Ex: joao@email.com"
                        >

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>Telefone</label>

                        <input
                            type="text"
                            id="telefone"
                            placeholder="Ex: (31) 99999-0000"
                        >

                    </div>

                    <div class="form-group">

                        <label>Matrícula</label>

                        <input
                            type="text"
                            id="matricula"
                            placeholder="Ex: MAT-001"
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select id="status">

                        <option value="ativo">
                            Ativo
                        </option>

                        <option value="inativo">
                            Inativo
                        </option>

                    </select>

                </div>

                <div class="modal-actions">

                    <button
                        type="button"
                        class="btn-secondary"
                        id="btn-cancelar"
                    >
                        Cancelar
                    </button>

                    <button type="submit" class="btn">
                        Salvar Usuário
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- JS -->
    <script src="../js/usuarios.js"></script>

</body>
</html>
