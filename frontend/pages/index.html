<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Biblioteca - Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/tabelas.css">
</head>

<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-book"></i>
            Biblioteca
        </div>

        <nav>
            <a href="index.html" class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="livros.html">
                <i class="fa-solid fa-book-open"></i>
                Livros
            </a>

            <a href="usuarios.html">
                <i class="fa-solid fa-users"></i>
                Usuários
            </a>

            <a href="emprestimos.html">
                <i class="fa-solid fa-right-left"></i>
                Empréstimos
            </a>
        </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="main">
        <!-- TOPO -->
        <div class="topbar">
            <h1>Dashboard</h1>

            <div class="search-box">
                <input
                    type="text"
                    placeholder="Pesquisar..."
                >
            </div>
        </div>

        <!-- CARDS -->
        <section class="cards">
            <div class="card">
                <i class="fa-solid fa-book"></i>
                <h2 id="total-livros">0</h2>
                <p>Livros cadastrados</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-users"></i>
                <h2 id="total-usuarios">0</h2>
                <p>Usuários ativos</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-right-left"></i>
                <h2 id="total-emprestimos">0</h2>
                <p>Empréstimos ativos</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-clock"></i>
                <h2 id="devolucoes-pendentes">0</h2>
                <p>Devoluções pendentes</p>
            </div>
        </section>

        <!-- TABELA -->
        <section class="table-container">
            <div class="table-header">
                <h2>Últimos Empréstimos</h2>

                <a href="emprestimos.html" class="btn">
                    + Novo Empréstimo
                </a>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuário</th>
                        <th>Livro</th>
                        <th>Data</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="ultimos-emprestimos">
                </tbody>
            </table>
        </section>
    </main>

    <!-- JS -->
    <script src="../js/app.js"></script>
</body>
</html>
